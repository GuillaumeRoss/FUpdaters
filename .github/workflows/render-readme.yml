name: Regenerate README on main

# On merge/push to main, rebuild the generated README table + footnotes from
# apps.json + the profile and commit the result back to main. Contributors only
# need to edit apps.json / the profile in their PR; the README is produced here.

on:
  push:
    branches: [main]
    paths:
      - "**/*.mobileconfig"
      - "apps.json"
      - "scripts/render_readme.py"

permissions:
  contents: write

concurrency:
  group: render-readme-main
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate README
        run: python3 scripts/render_readme.py

      - name: Commit if the README changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README already up to date; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: regenerate README table from apps.json [skip ci]"
          git push
