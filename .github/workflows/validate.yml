name: Validate profile

on:
  pull_request:
    paths:
      - "**/*.mobileconfig"
      - "apps.json"
      - "README.md"
      - "scripts/**"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "**/*.mobileconfig"
      - "apps.json"
      - "README.md"
      - "scripts/**"
      - ".github/workflows/validate.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: XML well-formedness (xmllint)
        run: |
          shopt -s nullglob
          files=(*.mobileconfig)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .mobileconfig files found"; exit 1
          fi
          for f in "${files[@]}"; do
            echo "xmllint --noout $f"
            xmllint --noout "$f"
          done

      - name: Structural validation (plist + payload UUIDs/identifiers)
        run: python3 scripts/validate_profile.py

      # The README table is generated (scripts/render_readme.py). This enforces
      # that the committed README matches apps.json + the profile, and that
      # apps.json and the profile reference the same set of apps. If it fails,
      # run `python3 scripts/render_readme.py` and commit the result.
      - name: README in sync (parity + generated table up to date)
        run: python3 scripts/render_readme.py --check
