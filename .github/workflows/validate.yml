name: Validate profile

on:
  pull_request:
    paths:
      - "**/*.mobileconfig"
      - "apps.json"
      - "README.md"
      - "scripts/**"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "**/*.mobileconfig"
      - "apps.json"
      - "README.md"
      - "scripts/**"
      - ".github/workflows/validate.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: XML well-formedness (xmllint)
        run: |
          shopt -s nullglob
          files=(*.mobileconfig)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .mobileconfig files found"; exit 1
          fi
          for f in "${files[@]}"; do
            echo "xmllint --noout $f"
            xmllint --noout "$f"
          done

      - name: Structural validation (plist + payload UUIDs/identifiers)
        run: python3 scripts/validate_profile.py

      # Enforces apps.json <-> profile parity (hard fail) and prints a preview of
      # the README the merge will produce. Does NOT require the PR to have
      # regenerated README — main regenerates it on merge (see render-readme.yml).
      - name: Preview README (dry run)
        run: |
          set -o pipefail
          python3 scripts/render_readme.py --dry-run | tee /tmp/readme.diff
          {
            echo '### README preview'
            echo 'This is what the table will look like after merge (main regenerates it automatically).'
            echo ''
            echo '```diff'
            cat /tmp/readme.diff
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
