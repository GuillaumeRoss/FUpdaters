name: Validate profile

on:
  pull_request:
    paths:
      - "**/*.mobileconfig"
      - "apps.json"
      - "README.md"
      - "scripts/**"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "**/*.mobileconfig"
      - "apps.json"
      - "README.md"
      - "scripts/**"
      - ".github/workflows/validate.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # validate_profile.py parses each .mobileconfig with plistlib, which fails
      # on malformed XML as well as on a well-formed-but-invalid plist — so it
      # already covers what xmllint did (and xmllint is no longer preinstalled on
      # ubuntu-latest runners).
      - name: Structural validation (well-formed plist + unique UUIDs/identifiers)
        run: python3 scripts/validate_profile.py

      # The README table is generated (scripts/render_readme.py). This enforces
      # that the committed README matches apps.json + the profile, and that
      # apps.json and the profile reference the same set of apps. If it fails,
      # run `python3 scripts/render_readme.py` and commit the result.
      - name: README in sync (parity + generated table up to date)
        run: python3 scripts/render_readme.py --check
